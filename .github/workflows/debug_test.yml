name: Build VisionStudio
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pygame pyinstaller
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --collect-all PyQt6 --collect-all pygame VisionStudio.py
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VisionStudio-App
          path: dist/VisionStudio.exe