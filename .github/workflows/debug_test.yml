name: Build VisionStudio

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pygame pyinstaller
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed VisionStudio.py
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VisionStudio-App
          path: dist/VisionStudio.exe